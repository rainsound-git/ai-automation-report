name: Notion 日次レポート & LINE 通知

on:
  schedule:
    # 毎朝 8:00 JST（= UTC 23:00、前日）に実行
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      report_days:
        description: "何日分の更新を取得するか"
        required: false
        default: "1"
      notify_always:
        description: "更新がなくても LINE 通知する (true/false)"
        required: false
        default: "false"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Notion 取得 & LINE 通知
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          REPORT_DAYS: ${{ github.event.inputs.report_days || '1' }}
          NOTIFY_ALWAYS: ${{ github.event.inputs.notify_always || 'false' }}
        run: python generate_report.py
